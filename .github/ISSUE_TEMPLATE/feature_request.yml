name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]

body:
  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - New document loader (format)
        - New embedding provider
        - New vector store backend
        - New retrieval strategy
        - New reranker
        - New prompt template
        - New LLM provider
        - New evaluation metric
        - API / endpoint
        - Performance / latency
        - Observability / monitoring
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "Currently the system doesn't support ColBERT late-interaction reranking, which would give 10-15% better MRR@10 on our benchmark..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you considered?

  - type: textarea
    id: references
    attributes:
      label: References / Papers
      description: Any relevant papers, implementations, or docs.
